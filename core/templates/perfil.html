{% extends 'base.html' %}
{% block title %}GastOS — Perfil{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h4 class="card-title mb-4">👤 Meu Perfil</h4>

                <form method="POST">
                    {% csrf_token %}
                    <h6 class="text-muted mb-3">Informações pessoais</h6>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Usuário</label>
                        <input type="text" class="form-control" value="{{ request.user.username }}" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nome</label>
                        <input type="text" name="first_name" class="form-control" value="{{ request.user.first_name }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Sobrenome</label>
                        <input type="text" name="last_name" class="form-control" value="{{ request.user.last_name }}">
                    </div>

                    <hr>
                    <h6 class="text-muted mb-3">Alterar senha</h6>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Senha atual</label>
                        <input type="password" name="senha_atual" class="form-control" placeholder="Digite sua senha atual">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nova senha</label>
                        <input type="password" name="senha_nova" class="form-control" placeholder="Digite a nova senha">
                    </div>

                    <button type="submit" class="btn btn-primary-custom w-100 mt-2">Salvar alterações</button>
                </form>
                <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary w-100 mt-2">Voltar</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
